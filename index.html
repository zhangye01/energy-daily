<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f0;
    color: #2c2c2a;
    line-height: 1.6;
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 280px;
    background: #2c2c2a;
    color: #f1efe8;
    padding: 0;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .sidebar-header p {
    font-size: 12px;
    color: #b4b2a9;
    margin-top: 4px;
  }

  .sidebar-status {
    padding: 12px 20px;
    font-size: 12px;
    color: #97c459;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: #97c459;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .report-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .report-item {
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    font-size: 13px;
    color: #d3d1c7;
  }

  .report-item:hover {
    background: rgba(255,255,255,0.08);
  }

  .report-item.active {
    background: rgba(255,255,255,0.12);
    border-left-color: #97c459;
    color: #fff;
  }

  .report-item .date {
    font-weight: 500;
    font-size: 14px;
  }

  .report-item .day {
    font-size: 11px;
    color: #888780;
    margin-top: 2px;
  }

  .report-item.active .day {
    color: #b4b2a9;
  }

  .report-item .today-badge {
    display: inline-block;
    background: #639922;
    color: #fff;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .sidebar-footer {
    padding: 12px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 11px;
    color: #888780;
  }

  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .content {
    width: 100%;
    max-width: 820px;
  }

  .content h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #2c2c2a;
  }

  .content h2 {
    font-size: 16px;
    font-weight: 500;
    margin: 28px 0 12px;
    color: #444441;
    padding-bottom: 8px;
    border-bottom: 1px solid #d3d1c7;
  }

  .content h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 20px 0 8px;
    color: #5f5e5a;
  }

  .content p {
    font-size: 14px;
    margin: 8px 0;
    color: #444441;
  }

  .content ul, .content ol {
    padding-left: 20px;
    font-size: 14px;
    color: #444441;
  }

  .content li {
    margin: 8px 0;
  }

  .content blockquote {
    border-left: 3px solid #97c459;
    padding: 8px 16px;
    margin: 12px 0;
    background: #f1f8e9;
    border-radius: 4px;
    font-size: 14px;
  }

  .content strong {
    font-weight: 500;
  }

  .content hr {
    border: none;
    border-top: 1px solid #d3d1c7;
    margin: 24px 0;
  }

  .content em {
    color: #888780;
  }

  .content code {
    background: #f1efe8;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 13px;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #888780;
  }

  .empty-state svg {
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 14px;
    color: #5f5e5a;
  }

  .meta-bar {
    font-size: 12px;
    color: #888780;
    margin-bottom: 20px;
  }

  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; max-height: 200px; }
    .main { padding: 20px 16px; }
  }
</style>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>能源电力市场每日动态</h1>
    <p>每日 8:00 自动更新</p>
  </div>
  <div class="sidebar-status">
    <span class="status-dot"></span> 自动化运行中
  </div>
  <div class="report-list" id="reportList">
    <div class="empty-state" style="padding:40px 20px;">
      <p style="font-size:12px;color:#888780;">加载中...</p>
    </div>
  </div>
  <div class="sidebar-footer">WorkBuddy 自动化生成</div>
</div>

<div class="main">
  <div class="content" id="content">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#888780" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <line x1="8" y1="8" x2="16" y2="8"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="8" y1="16" x2="12" y2="16"/>
      </svg>
      <p>选择左侧日期查看简报</p>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script>
async function loadReports() {
  const resp = await fetch('reports/manifest.json');
  const files = await resp.json();
  const links = files.filter(f => f.endsWith('.md')).sort().reverse();

  const listEl = document.getElementById('reportList');

  if (links.length === 0) {
    listEl.innerHTML = '<div class="empty-state" style="padding:40px 20px;"><p style="font-size:12px;color:#888780;">暂无简报</p></div>';
    return [];
  }

  const today = new Date().toISOString().slice(0, 10);

  listEl.innerHTML = links.map(file => {
    const dateMatch = file.match(/(\d{4}-\d{2}-\d{2})/);
    const date = dateMatch ? dateMatch[1] : file;
    const isToday = date === today;
    const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
    const d = new Date(date + 'T00:00:00+08:00');
    const dayName = `周${dayNames[d.getDay()]}`;

    return `
      <div class="report-item${isToday ? ' active' : ''}" data-file="${file}">
        <span class="date">${date}</span>${isToday ? '<span class="today-badge">今天</span>' : ''}
        <div class="day">${dayName}</div>
      </div>
    `;
  }).join('');

  listEl.querySelectorAll('.report-item').forEach(item => {
    item.addEventListener('click', () => {
      listEl.querySelectorAll('.report-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      loadContent(item.dataset.file);
    });
  });

  return links;
}

async function loadContent(file) {
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '<div class="empty-state"><p>加载中...</p></div>';

  try {
    const resp = await fetch('reports/' + file);
    const md = await resp.text();
    const html = marked.parse(md);
    contentEl.innerHTML = html;
  } catch (e) {
    contentEl.innerHTML = '<div class="empty-state"><p>加载失败，请稍后重试</p></div>';
  }
}

(async () => {
  const links = await loadReports();
  if (links.length > 0) {
    const today = new Date().toISOString().slice(0, 10);
    const todayFile = links.find(f => f.includes(today));
    loadContent(todayFile || links[0]);
  }
})();
</script>
